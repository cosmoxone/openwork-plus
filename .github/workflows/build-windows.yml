name: Build Windows Desktop

# Windows-only zh-CN MSI on main. Publishes a GitHub Pre-release with public download links.
# Tauri updater signing is enabled automatically when TAURI_SIGNING_PRIVATE_KEY is configured.
# en-US MSI is built by Release App (tag v*) via tauri.release.windows-en.json.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build (default: branch that triggered the run)"
        required: false
        type: string
      bundles:
        description: "Tauri bundle types (comma-separated)"
        required: false
        default: msi
        type: string
      publish_prerelease:
        description: "Upload MSI (+ updater files if signed) to GitHub Pre-releases"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows MSI (zh-CN)
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      TAURI_TARGET: x86_64-pc-windows-msvc
      OPENCODE_GITHUB_REPO: ${{ vars.OPENCODE_GITHUB_REPO || 'anomalyco/opencode' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Enable git long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build metadata
        id: meta
        shell: pwsh
        run: |
          $conf = Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $conf.version
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $tag = "windows-v${version}-build.${{ github.run_number }}"
          $name = "OpenWorkPlus Windows ${version} (zh-CN, build ${{ github.run_number }})"
          $body = @"
          Automated Windows pre-release from ``main``.

          - Version: ``${version}``
          - Commit: ``${{ github.sha }}``
          - Locale: ``zh-CN`` (WiX)
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Updater artifacts are included when ``TAURI_SIGNING_PRIVATE_KEY`` is configured.
          "@
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "body<<EOF" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Write Tauri CI config (zh-CN)
        shell: pwsh
        run: |
          $signed = -not [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)
          $args = @("scripts/write-tauri-ci-config.mjs", "--locale", "zh-CN")
          if ($signed) { $args += "--signed" }
          node @args

      - name: Build desktop (Tauri MSI)
        shell: pwsh
        run: |
          $bundles = "${{ github.event.inputs.bundles || 'msi' }}"
          pnpm --filter @openworkplus/desktop exec tauri build --target $env:TAURI_TARGET --bundles $bundles --config src-tauri/tauri.ci.generated.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwork-plus-windows-${{ github.run_number }}
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.sig
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/latest.json
          if-no-files-found: error

      - name: Publish GitHub Pre-release
        if: github.event_name == 'push' || github.event.inputs.publish_prerelease != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.meta.outputs.body }}
          prerelease: true
          draft: false
          make_latest: false
          files: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.sig
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/latest.json
